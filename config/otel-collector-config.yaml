# ── OpenTelemetry Collector Configuration ──────────────────────────────
# Receives OTLP from the NIM Gateway and forwards to the AI Observability
# Platform (or other backends).
#
# In the Enterprise AI Platform, the observability service runs at
#   observability-platform:4318
#
# Usage with docker-compose:
#   docker compose -f docker/docker-compose.yml --profile monitoring up -d
# ───────────────────────────────────────────────────────────────────────

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 1s
    limit_mib: 512

  attributes:
    actions:
      - key: nim_gateway_version
        value: "0.1.0"
        action: upsert

exporters:
  debug:
    verbosity: detailed

  # ── Forward to AI Observability Platform ──────────────────────────
  otlp/observability:
    endpoint: "http://observability-platform:4317"
    tls:
      insecure: true

  # ── Forward to Jaeger (if running) ────────────────────────────────
  # jaeger:
  #   endpoint: "jaeger:4317"
  #   tls:
  #     insecure: true

  # ── Forward to Prometheus (if using otlp metric receiver) ─────────
  # prometheus:
  #   endpoint: "0.0.0.0:8889"
  #   namespace: nim_gateway

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes]
      exporters: [debug, otlp/observability]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes]
      exporters: [debug, otlp/observability]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes]
      exporters: [debug, otlp/observability]
